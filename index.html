<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>숏폼 대본 생성기 · 끈질긴라벤더</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #F4F1FA;
    --surface: #FFFFFF;
    --ink: #1C1830;
    --muted: #6E6886;
    --lav: #6D5BAE;
    --lav-deep: #4E3F86;
    --lav-soft: #EAE4F6;
    --lav-line: #D9D0EE;
    --ok: #2F8F6B;
    --warn: #C0573C;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(28,24,48,.04), 0 8px 28px rgba(78,63,134,.07);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px; }

  header { margin-bottom: 28px; }
  .brand {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: "Instrument Serif", serif;
    font-size: 19px; letter-spacing: .2px; color: var(--lav-deep);
  }
  .brand svg { display: block; }
  h1 {
    font-size: clamp(26px, 4vw, 38px);
    line-height: 1.12;
    margin: 14px 0 6px;
    font-weight: 800;
    letter-spacing: -.02em;
  }
  h1 em {
    font-family: "Instrument Serif", serif;
    font-style: italic; font-weight: 400;
    color: var(--lav);
  }
  .sub { color: var(--muted); font-size: 15px; max-width: 52ch; }

  .grid { display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: start; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--lav-line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px;
  }
  .panel.form { position: sticky; top: 24px; }
  @media (max-width: 860px) { .panel.form { position: static; } }

  .field { margin-bottom: 15px; }
  .field:last-of-type { margin-bottom: 0; }
  label {
    display: block; font-size: 12.5px; font-weight: 700;
    color: var(--lav-deep); margin-bottom: 6px; letter-spacing: .01em;
  }
  label .opt { color: var(--muted); font-weight: 500; }
  input[type="text"], textarea, select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--lav-line); border-radius: 10px;
    font-family: inherit; font-size: 14px; color: var(--ink);
    background: #FCFBFE; transition: border-color .15s, box-shadow .15s;
  }
  textarea { resize: vertical; min-height: 62px; }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--lav);
    box-shadow: 0 0 0 3px rgba(109,91,174,.16);
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  button.generate {
    width: 100%; margin-top: 20px; padding: 13px;
    background: var(--lav); color: #fff; border: 0; border-radius: 11px;
    font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background .15s, transform .05s;
  }
  button.generate:hover { background: var(--lav-deep); }
  button.generate:active { transform: translateY(1px); }
  button.generate:disabled { background: var(--lav-line); cursor: not-allowed; }

  /* output */
  .panel.out { min-height: 320px; }
  .placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; min-height: 300px; color: var(--muted); text-align: center; gap: 12px;
  }
  .placeholder svg { opacity: .5; }

  .loading { display: flex; align-items: center; gap: 11px; color: var(--lav-deep); padding: 8px 2px; font-weight: 600; }
  .spinner {
    width: 17px; height: 17px; border: 2.5px solid var(--lav-soft);
    border-top-color: var(--lav); border-radius: 50%; animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err {
    background: #FCEEEA; border: 1px solid #F0C9BC; color: var(--warn);
    padding: 12px 14px; border-radius: 10px; font-size: 14px;
  }

  .block { margin-bottom: 26px; }
  .block:last-child { margin-bottom: 0; }
  .block-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; gap: 10px;
  }
  .block-head h3 {
    margin: 0; font-size: 12px; font-weight: 800; letter-spacing: .08em;
    text-transform: uppercase; color: var(--lav);
  }
  .block-head .n {
    font-family: "Instrument Serif", serif; font-size: 17px; color: var(--lav-line);
  }

  .copy {
    background: var(--lav-soft); color: var(--lav-deep); border: 0;
    padding: 5px 11px; border-radius: 7px; font-family: inherit;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: background .15s;
    white-space: nowrap;
  }
  .copy:hover { background: var(--lav-line); }
  .copy.done { background: #DCEFE7; color: var(--ok); }

  .hook {
    background: #FBFAFE; border: 1px solid var(--lav-line); border-left: 3px solid var(--lav);
    border-radius: 9px; padding: 11px 13px; margin-bottom: 9px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .hook span { font-size: 14.5px; font-weight: 600; }
  .hook .copy { align-self: center; }

  .scene { display: grid; grid-template-columns: 64px 1fr; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--lav-soft); }
  .scene:last-child { border-bottom: 0; }
  .scene .t { font-family: "Instrument Serif", serif; font-size: 15px; color: var(--lav); padding-top: 1px; }
  .scene .nar { font-size: 14.5px; margin-bottom: 4px; }
  .scene .cap { font-size: 12.5px; color: var(--muted); }
  .scene .cap b { color: var(--lav-deep); font-weight: 700; }

  .textbox {
    background: #FBFAFE; border: 1px solid var(--lav-line); border-radius: 9px;
    padding: 12px 13px; font-size: 14px; white-space: pre-wrap; word-break: break-word;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { background: var(--lav-soft); color: var(--lav-deep); padding: 4px 9px; border-radius: 6px; font-size: 12.5px; font-weight: 600; }

  .tip { display: flex; gap: 9px; align-items: flex-start; color: var(--muted); font-size: 13.5px; background: #FBFAFE; border-radius: 9px; padding: 11px 13px; }
  .tip b { color: var(--lav-deep); }

  .voicebar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    margin: 2px 0 14px; padding: 10px 12px;
    background: #FBFAFE; border: 1px solid var(--lav-line); border-radius: 9px;
  }
  .voicebar label { margin: 0; font-size: 11.5px; color: var(--muted); font-weight: 700; }
  .voicebar select, .voicebar input {
    padding: 6px 8px; font-size: 13px; border: 1px solid var(--lav-line);
    border-radius: 7px; background: #fff; color: var(--ink); font-family: inherit;
  }
  .voicebar input.spk { width: 110px; }
  .voicebar .hint { font-size: 11px; color: var(--muted); margin-left: auto; }

  .aud { display: flex; gap: 6px; margin-top: 8px; }
  .sbtn {
    display: inline-flex; align-items: center; gap: 4px;
    background: #fff; border: 1px solid var(--lav-line); color: var(--lav-deep);
    padding: 4px 10px; border-radius: 7px; font-family: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .sbtn:hover { background: var(--lav-soft); border-color: var(--lav); }
  .sbtn:disabled { opacity: .55; cursor: wait; }

  footer { margin-top: 36px; color: var(--muted); font-size: 12.5px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 3c0 5-3 7-3 10a3 3 0 006 0c0-3-3-5-3-10z" fill="#6D5BAE"/>
        <path d="M12 14v7M9 18l3-1 3 1" stroke="#4E3F86" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      끈질긴라벤더
    </span>
    <h1>숏폼 대본을 <em>한 번에</em><br />뽑아내는 생성기</h1>
    <p class="sub">상품 정보를 넣으면 후킹 멘트·컷별 자막·업로드 제목·설명란까지. 경제적 이해관계 표시 문구는 자동으로 들어갑니다.</p>
  </header>

  <div class="grid">
    <!-- INPUT -->
    <section class="panel form">
      <div class="field">
        <label for="productName">상품명</label>
        <input type="text" id="productName" placeholder="예: 스테인리스 진공 텀블러 500ml" />
      </div>

      <div class="row">
        <div class="field">
          <label for="category">카테고리</label>
          <select id="category">
            <option>주방/생활용품</option>
            <option>뷰티/패션</option>
            <option>디지털/가전</option>
            <option>식품/건강</option>
            <option>육아/반려</option>
            <option>기타</option>
          </select>
        </div>
        <div class="field">
          <label for="price">가격 <span class="opt">(선택)</span></label>
          <input type="text" id="price" placeholder="예: 12,900원" />
        </div>
      </div>

      <div class="field">
        <label for="sellingPoints">핵심 셀링포인트 <span class="opt">(비우면 AI가 추론)</span></label>
        <textarea id="sellingPoints" placeholder="예: 6시간 보냉, 손에 쏙 들어오는 슬림핏, 식세기 가능"></textarea>
      </div>

      <div class="row">
        <div class="field">
          <label for="tone">톤</label>
          <select id="tone">
            <option>공감형</option>
            <option>정보형</option>
            <option>유머형</option>
          </select>
        </div>
        <div class="field">
          <label for="duration">영상 길이</label>
          <select id="duration">
            <option value="15">15초</option>
            <option value="30" selected>30초</option>
            <option value="45">45초</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="platform">제휴 플랫폼</label>
        <select id="platform">
          <option value="coupang">쿠팡파트너스</option>
          <option value="naver">네이버 쇼핑커넥트</option>
        </select>
      </div>

      <div class="field">
        <label for="link">제휴 링크 <span class="opt">(선택, 설명란에 삽입)</span></label>
        <input type="text" id="link" placeholder="https://link.coupang.com/..." />
      </div>

      <button class="generate" id="genBtn">대본 생성</button>
    </section>

    <!-- OUTPUT -->
    <section class="panel out" id="out">
      <div class="placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="18" height="16" rx="2.5" stroke="#D9D0EE" stroke-width="1.5"/>
          <path d="M10 9l4 3-4 3V9z" fill="#D9D0EE"/>
        </svg>
        <div>왼쪽에 상품 정보를 넣고<br /><b style="color:var(--lav-deep)">대본 생성</b>을 눌러보세요.</div>
      </div>
    </section>
  </div>

  <footer>끈질긴라벤더 · Vercel + Claude API</footer>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const out = $('out');
  const btn = $('genBtn');

  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  function copyBtn(text, label = '복사') {
    const enc = encodeURIComponent(text);
    return `<button class="copy" data-copy="${enc}">${label}</button>`;
  }

  document.addEventListener('click', (e) => {
    const b = e.target.closest('.copy');
    if (!b) return;
    const text = decodeURIComponent(b.dataset.copy || '');
    navigator.clipboard.writeText(text).then(() => {
      const old = b.textContent;
      b.textContent = '복사됨'; b.classList.add('done');
      setTimeout(() => { b.textContent = old; b.classList.remove('done'); }, 1300);
    });
  });

  // ── 음성(TTS) ─────────────────────────────
  function voiceSettings() {
    const sel = $('voice');
    let speaker = sel ? sel.value : 'ko-KR-Wavenet-A';
    if (speaker === '__custom') {
      const c = $('voiceCustom');
      speaker = (c && c.value.trim()) || 'ko-KR-Wavenet-A';
    }
    const sp = $('speed2');
    return { speaker, speed: sp ? sp.value : 0 };
  }

  async function fetchTTS(text) {
    const { speaker, speed } = voiceSettings();
    const r = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ text, speaker, speed }),
    });
    if (!r.ok) {
      let msg = 'TTS 생성에 실패했습니다.';
      try { const e = await r.json(); msg = e.error || msg; } catch (_) {}
      throw new Error(msg);
    }
    return r.blob();
  }

  let currentAudio = null;

  out.addEventListener('change', (e) => {
    if (e.target.id === 'voice') {
      const c = $('voiceCustom');
      if (c) c.style.display = e.target.value === '__custom' ? '' : 'none';
    }
  });

  out.addEventListener('click', async (e) => {
    const b = e.target.closest('.sbtn');
    if (!b) return;
    const i = Number(b.dataset.i);
    const text = ((window.__scenes || [])[i] || {}).narration || '';
    if (!text) return;

    const isDownload = b.classList.contains('dl');
    const old = b.textContent;
    b.disabled = true; b.textContent = '생성 중…';
    try {
      const blob = await fetchTTS(text);
      const url = URL.createObjectURL(blob);
      if (isDownload) {
        const a = document.createElement('a');
        a.href = url; a.download = `scene_${i + 1}.mp3`;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 4000);
      } else {
        if (currentAudio) currentAudio.pause();
        currentAudio = new Audio(url);
        currentAudio.play();
      }
    } catch (err) {
      alert(err.message);
    } finally {
      b.disabled = false; b.textContent = old;
    }
  });

  function render(d) {
    window.__scenes = d.scenes || [];
    const fullScript = (d.scenes || [])
      .map((s) => `[${s.time}] ${s.narration}`).join('\n');

    const hooks = (d.hooks || []).map((h) => `
      <div class="hook"><span>${esc(h)}</span>${copyBtn(h)}</div>`).join('');

    const scenes = (d.scenes || []).map((s, i) => `
      <div class="scene">
        <div class="t">${esc(s.time)}</div>
        <div>
          <div class="nar">${esc(s.narration)}</div>
          <div class="cap"><b>자막</b> · ${esc(s.caption)}</div>
          <div class="aud">
            <button class="sbtn play" data-i="${i}">🔊 듣기</button>
            <button class="sbtn dl" data-i="${i}">⬇ mp3</button>
          </div>
        </div>
      </div>`).join('');

    const tags = (d.hashtags || []).map((t) => `<span class="tag">${esc(t)}</span>`).join('');

    out.innerHTML = `
      <div class="block">
        <div class="block-head"><h3>후킹 멘트 · 첫 3초</h3><span class="n">01</span></div>
        ${hooks}
      </div>

      <div class="block">
        <div class="block-head">
          <h3>컷별 대본 + 자막 · 음성</h3>
          ${copyBtn(fullScript, '대본 전체 복사')}
        </div>
        <div class="voicebar">
          <label>화자</label>
          <select id="voice">
            <option value="ko-KR-Wavenet-A">여성 A (Wavenet)</option>
            <option value="ko-KR-Wavenet-B">여성 B (Wavenet)</option>
            <option value="ko-KR-Wavenet-C">남성 C (Wavenet)</option>
            <option value="ko-KR-Wavenet-D">남성 D (Wavenet)</option>
            <option value="ko-KR-Neural2-A">여성 A (Neural2·고품질)</option>
            <option value="ko-KR-Neural2-C">남성 C (Neural2·고품질)</option>
            <option value="__custom">직접 입력 →</option>
          </select>
          <input class="spk" id="voiceCustom" placeholder="예: ko-KR-Chirp3-HD-Aoede" style="display:none" />
          <label>속도</label>
          <select id="speed2">
            <option value="-1">약간 빠르게</option>
            <option value="0" selected>보통</option>
            <option value="1">약간 느리게</option>
          </select>
          <span class="hint">Google TTS · 컷마다 mp3로 저장</span>
        </div>
        ${scenes}
      </div>

      <div class="block">
        <div class="block-head"><h3>업로드 제목</h3>${copyBtn(d.title || '')}</div>
        <div class="textbox">${esc(d.title)}</div>
      </div>

      <div class="block">
        <div class="block-head"><h3>설명란</h3>${copyBtn(d.description || '')}</div>
        <div class="textbox">${esc(d.description)}</div>
      </div>

      <div class="block">
        <div class="block-head"><h3>해시태그</h3>${copyBtn((d.hashtags || []).join(' '))}</div>
        <div class="tags">${tags}</div>
      </div>

      ${d.shootingTip ? `
      <div class="block">
        <div class="tip"><span>💡</span><div><b>촬영 팁</b> · ${esc(d.shootingTip)}</div></div>
      </div>` : ''}
    `;
  }

  async function generate() {
    const productName = $('productName').value.trim();
    if (!productName) {
      $('productName').focus();
      out.innerHTML = `<div class="err">상품명을 먼저 입력해주세요.</div>`;
      return;
    }

    btn.disabled = true;
    out.innerHTML = `<div class="loading"><div class="spinner"></div>대본 짜는 중… 잠깐만요</div>`;

    const payload = {
      productName,
      category: $('category').value,
      price: $('price').value.trim(),
      sellingPoints: $('sellingPoints').value.trim(),
      tone: $('tone').value,
      duration: $('duration').value,
      platform: $('platform').value,
      link: $('link').value.trim(),
    };

    try {
      const r = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await r.json();
      if (!r.ok || data.error) {
        out.innerHTML = `<div class="err">${esc(data.error || '생성에 실패했습니다.')}</div>`;
      } else {
        render(data);
      }
    } catch (e) {
      out.innerHTML = `<div class="err">요청 중 오류가 발생했습니다: ${esc(e.message)}</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', generate);
  $('productName').addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(); });
</script>
</body>
</html>
