<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영상 만들기 · 끈질긴라벤더</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #F4F1FA; --surface: #FFFFFF; --ink: #1C1830; --muted: #6E6886;
    --lav: #6D5BAE; --lav-deep: #4E3F86; --lav-soft: #EAE4F6; --lav-line: #D9D0EE;
    --ok: #2F8F6B; --warn: #C0573C; --radius: 14px;
    --shadow: 0 1px 2px rgba(28,24,48,.04), 0 8px 28px rgba(78,63,134,.07);
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: "Pretendard", system-ui, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 20px 80px; }
  .brand { display: inline-flex; align-items: center; gap: 9px; font-family: "Instrument Serif", serif; font-size: 19px; color: var(--lav-deep); }
  a.back { color: var(--muted); font-size: 13px; text-decoration: none; }
  a.back:hover { color: var(--lav-deep); }
  h1 { font-size: clamp(24px, 4vw, 34px); margin: 12px 0 6px; font-weight: 800; letter-spacing: -.02em; }
  h1 em { font-family: "Instrument Serif", serif; font-style: italic; font-weight: 400; color: var(--lav); }
  .sub { color: var(--muted); font-size: 14.5px; max-width: 56ch; }

  .grid { display: grid; grid-template-columns: 400px 1fr; gap: 24px; align-items: start; margin-top: 26px; }
  @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--surface); border: 1px solid var(--lav-line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; }

  label { display: block; font-size: 12.5px; font-weight: 700; color: var(--lav-deep); margin-bottom: 6px; }
  label .opt { color: var(--muted); font-weight: 500; }
  .field { margin-bottom: 16px; }
  select, input[type="text"], textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--lav-line); border-radius: 10px;
    font-family: inherit; font-size: 14px; color: var(--ink); background: #FCFBFE;
  }
  textarea { resize: vertical; min-height: 90px; font-size: 12.5px; }
  select:focus, input:focus, textarea:focus { outline: none; border-color: var(--lav); box-shadow: 0 0 0 3px rgba(109,91,174,.16); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .drop {
    border: 1.5px dashed var(--lav-line); border-radius: 11px; padding: 18px; text-align: center;
    color: var(--muted); font-size: 13px; cursor: pointer; background: #FBFAFE; transition: border-color .15s, background .15s;
  }
  .drop:hover, .drop.over { border-color: var(--lav); background: var(--lav-soft); }
  .thumbs { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .thumbs img, .thumbs video { width: 46px; height: 46px; object-fit: cover; border-radius: 7px; border: 1px solid var(--lav-line); }
  .urlrow { display: flex; gap: 7px; margin-top: 9px; }
  .urlrow input { flex: 1; }
  #urlBtn { background: var(--lav-soft); color: var(--lav-deep); border: 0; padding: 0 14px; border-radius: 9px; font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  #urlBtn:hover { background: var(--lav-line); }
  #urlBtn:disabled { opacity: .6; cursor: wait; }

  button.go {
    width: 100%; margin-top: 8px; padding: 14px; background: var(--lav); color: #fff; border: 0; border-radius: 11px;
    font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s, transform .05s;
  }
  button.go:hover { background: var(--lav-deep); }
  button.go:active { transform: translateY(1px); }
  button.go:disabled { background: var(--lav-line); cursor: not-allowed; }

  .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .preview-wrap { width: 100%; max-width: 300px; aspect-ratio: 9/16; border-radius: 12px; overflow: hidden; background: #0E0B1A; border: 1px solid var(--lav-line); display: flex; align-items: center; justify-content: center; }
  .preview-wrap canvas, .preview-wrap video { width: 100%; height: 100%; object-fit: contain; display: block; }
  .preview-wrap .ph { color: #8A82A6; font-size: 13px; text-align: center; padding: 20px; }

  .status { width: 100%; }
  .bar { height: 8px; background: var(--lav-soft); border-radius: 99px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0%; background: var(--lav); transition: width .2s; }
  .status p { margin: 9px 2px 0; font-size: 13px; color: var(--lav-deep); font-weight: 600; }

  .dl { display: inline-flex; align-items: center; gap: 6px; background: var(--lav-soft); color: var(--lav-deep); border: 0; padding: 9px 16px; border-radius: 9px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; }
  .dl:hover { background: var(--lav-line); }
  .err { background: #FCEEEA; border: 1px solid #F0C9BC; color: var(--warn); padding: 11px 13px; border-radius: 10px; font-size: 13.5px; width: 100%; }
  .hint2 { font-size: 11.5px; color: var(--muted); margin-top: 5px; }
  footer { margin-top: 36px; color: var(--muted); font-size: 12.5px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 생성기로</a>
  <div style="margin-top:10px"><span class="brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3c0 5-3 7-3 10a3 3 0 006 0c0-3-3-5-3-10z" fill="#6D5BAE"/><path d="M12 14v7M9 18l3-1 3 1" stroke="#4E3F86" stroke-width="1.4" stroke-linecap="round"/></svg>
    끈질긴라벤더</span></div>
  <h1>대본을 <em>영상으로</em></h1>
  <p class="sub">대본·음성·자막을 9:16 세로 영상으로 자동 합성합니다. 이미지를 넣으면 상품이 보이고, 안 넣으면 라벤더 배경으로 나옵니다.</p>

  <div class="grid">
    <section class="panel">
      <div class="field">
        <label>대본 <span class="opt">(생성기에서 넘어오면 자동 입력)</span></label>
        <textarea id="scriptJson" placeholder='생성기에서 "🎬 영상 만들기"를 누르면 자동으로 채워집니다. 직접 붙여넣어도 됩니다(JSON).'></textarea>
        <div class="hint2" id="scriptInfo"></div>
      </div>

      <div class="field">
        <label>상품 이미지/영상 <span class="opt">(여러 개 가능 · 선택)</span></label>
        <div class="drop" id="imgDrop">이미지·영상을 끌어다 놓거나 클릭해서 선택<br/>안 넣으면 라벤더 그라데이션 배경</div>
        <input type="file" id="imgInput" accept="image/*,video/*" multiple hidden />
        <div class="urlrow">
          <input type="text" id="urlInput" placeholder="상품 페이지 URL → 이미지 자동 추출" />
          <button type="button" id="urlBtn">가져오기</button>
        </div>
        <div class="hint2" id="urlInfo"></div>
        <div class="thumbs" id="thumbs"></div>
      </div>

      <div class="row">
        <div class="field">
          <label>화자</label>
          <select id="voice">
            <option value="ko-KR-Wavenet-A">여성 A (Wavenet)</option>
            <option value="ko-KR-Wavenet-B">여성 B (Wavenet)</option>
            <option value="ko-KR-Wavenet-C">남성 C (Wavenet)</option>
            <option value="ko-KR-Wavenet-D">남성 D (Wavenet)</option>
            <option value="ko-KR-Neural2-A">여성 A (Neural2)</option>
            <option value="ko-KR-Neural2-C">남성 C (Neural2)</option>
          </select>
        </div>
        <div class="field">
          <label>속도</label>
          <select id="speed">
            <option value="-1">약간 빠르게</option>
            <option value="0" selected>보통</option>
            <option value="1">약간 느리게</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>해상도</label>
          <select id="res">
            <option value="1080">1080×1920 (고화질)</option>
            <option value="720" selected>720×1280 (빠름·권장)</option>
          </select>
        </div>
        <div class="field">
          <label>배경음 <span class="opt">(선택)</span></label>
          <select id="bgmMode">
            <option value="none">없음</option>
            <option value="calm">자동 생성 · 잔잔</option>
            <option value="bright">자동 생성 · 밝게</option>
            <option value="upload">직접 업로드</option>
          </select>
          <input type="file" id="bgmInput" accept="audio/*" style="display:none;margin-top:8px" />
        </div>
      </div>

      <button class="go" id="goBtn">🎬 영상 만들기</button>
      <div class="hint2">Chrome 권장 · 녹화는 실시간이라 영상 길이만큼 걸립니다.</div>
    </section>

    <section class="panel">
      <div class="stage">
        <div class="preview-wrap" id="previewWrap">
          <div class="ph" id="ph">여기에 미리보기가 표시됩니다.<br/>왼쪽에서 <b style="color:#B9AEDF">영상 만들기</b>를 누르세요.</div>
          <canvas id="canvas" width="720" height="1280" style="display:none"></canvas>
          <video id="video" controls playsinline style="display:none"></video>
        </div>
        <div class="status" id="status" style="display:none">
          <div class="bar"><i id="barFill"></i></div>
          <p id="statusText">준비 중…</p>
        </div>
        <a class="dl" id="dlBtn" style="display:none" download="shortform.webm">⬇ 영상 다운로드</a>
        <div class="err" id="err" style="display:none"></div>
      </div>
    </section>
  </div>

  <footer>끈질긴라벤더 · 브라우저 자동 렌더</footer>
</div>

<script>
const $ = (id) => document.getElementById(id);

// ── 대본 로드 (생성기 핸드오프 or 직접) ──────────────
let SCRIPT = null;
function loadHandoff() {
  try {
    const raw = sessionStorage.getItem('shortform_script');
    if (raw) {
      $('scriptJson').value = raw;
      const obj = JSON.parse(raw);
      if (obj.voice) {
        if (obj.voice.speaker) $('voice').value = obj.voice.speaker;
        if (obj.voice.speed != null) $('speed').value = String(obj.voice.speed);
      }
    }
  } catch (e) {}
  reflectScript();
}
function reflectScript() {
  try {
    const obj = JSON.parse($('scriptJson').value.trim());
    const scenes = obj.scenes || obj; // 배열만 붙여넣은 경우도 허용
    SCRIPT = Array.isArray(scenes) ? { scenes } : obj;
    const n = (SCRIPT.scenes || []).length;
    $('scriptInfo').textContent = n ? `컷 ${n}개 인식됨` : '대본을 인식하지 못했습니다.';
  } catch (e) {
    SCRIPT = null;
    $('scriptInfo').textContent = $('scriptJson').value.trim() ? '⚠ JSON 형식이 아닙니다.' : '';
  }
}
$('scriptJson').addEventListener('input', reflectScript);

// ── 미디어(이미지/영상) 업로드 ──────────────
let MEDIA = []; // { type:'image'|'video', el }

function intrinsic(el) {
  return {
    w: el.videoWidth || el.naturalWidth || el.width || 1,
    h: el.videoHeight || el.naturalHeight || el.height || 1,
  };
}

function addMediaFiles(files) {
  [...files].forEach((f) => {
    const url = URL.createObjectURL(f);
    if (f.type.startsWith('video/')) {
      const v = document.createElement('video');
      v.src = url; v.muted = true; v.loop = true; v.playsInline = true; v.preload = 'auto';
      v.onloadeddata = () => {
        MEDIA.push({ type: 'video', el: v });
        const t = document.createElement('video'); t.src = url; t.muted = true; t.playsInline = true; $('thumbs').appendChild(t);
      };
      v.load();
    } else if (f.type.startsWith('image/')) {
      const img = new Image();
      img.onload = () => {
        MEDIA.push({ type: 'image', el: img });
        const t = document.createElement('img'); t.src = url; $('thumbs').appendChild(t);
      };
      img.src = url;
    }
  });
}
$('imgDrop').addEventListener('click', () => $('imgInput').click());
$('imgInput').addEventListener('change', (e) => addMediaFiles(e.target.files));
$('imgDrop').addEventListener('dragover', (e) => { e.preventDefault(); $('imgDrop').classList.add('over'); });
$('imgDrop').addEventListener('dragleave', () => $('imgDrop').classList.remove('over'));
$('imgDrop').addEventListener('drop', (e) => { e.preventDefault(); $('imgDrop').classList.remove('over'); addMediaFiles(e.dataTransfer.files); });

function addImageSrc(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      MEDIA.push({ type: 'image', el: img });
      const t = document.createElement('img'); t.src = src; $('thumbs').appendChild(t);
      resolve(true);
    };
    img.onerror = () => resolve(false);
    img.src = src;
  });
}

// URL에서 이미지 자동 추출
$('urlBtn').addEventListener('click', async () => {
  const url = $('urlInput').value.trim();
  if (!url) return;
  const btn = $('urlBtn'); btn.disabled = true; const old = btn.textContent; btn.textContent = '가져오는 중…';
  $('urlInfo').textContent = '';
  try {
    const r = await fetch('/api/scrape', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ url }) });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || '가져오기 실패');
    const imgs = data.images || [];
    if (!imgs.length) { $('urlInfo').textContent = '이미지를 찾지 못했어요 — 직접 업로드해 주세요.'; }
    else {
      let ok = 0;
      for (const src of imgs) { if (await addImageSrc(src)) ok++; }
      $('urlInfo').textContent = ok ? `이미지 ${ok}장 추가됨` : '이미지를 불러오지 못했어요.';
    }
  } catch (e) {
    $('urlInfo').textContent = '⚠ ' + e.message + ' — 직접 업로드해 주세요.';
  } finally {
    btn.disabled = false; btn.textContent = old;
  }
});

// 배경음 모드 토글
$('bgmMode').addEventListener('change', (e) => {
  $('bgmInput').style.display = e.target.value === 'upload' ? '' : 'none';
});

// ── 유틸 ──────────────
function setStatus(pct, text) { $('status').style.display = 'block'; $('barFill').style.width = pct + '%'; $('statusText').textContent = text; }
function showErr(msg) { $('err').style.display = 'block'; $('err').textContent = msg; }
function clearErr() { $('err').style.display = 'none'; }

function voicePayload() { return { speaker: $('voice').value, speed: $('speed').value }; }

async function ttsBlob(text) {
  const r = await fetch('/api/tts', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ text, ...voicePayload() }),
  });
  if (!r.ok) { let m = 'TTS 실패'; try { m = (await r.json()).error || m; } catch (_) {} throw new Error(m); }
  return r.blob();
}

function audioFromBlob(blob) {
  return new Promise((resolve, reject) => {
    const el = new Audio(URL.createObjectURL(blob));
    el.preload = 'auto';
    el.onloadedmetadata = () => resolve(el);
    el.onerror = () => reject(new Error('오디오 로드 실패'));
  });
}

// ── 캔버스 드로잉 ──────────────
function drawCover(ctx, el, W, H, zoom) {
  const d = intrinsic(el);
  const ir = d.w / d.h, r = W / H;
  let dw, dh;
  if (ir > r) { dh = H * zoom; dw = dh * ir; } else { dw = W * zoom; dh = dw / ir; }
  ctx.drawImage(el, (W - dw) / 2, (H - dh) / 2, dw, dh);
}
// 블러 배경 (여백을 검정 대신 흐린 같은 이미지로 채움 — 인스타 감성)
function drawBlurBg(ctx, el, W, H) {
  ctx.save();
  ctx.filter = 'blur(34px) brightness(0.6)';
  drawCover(ctx, el, W, H, 1.25);
  ctx.restore();
}
// contain 핏 (상품 전체가 보이게) + 켄번스 줌·팬
function drawContain(ctx, el, W, H, zoom, panX, panY) {
  const d = intrinsic(el);
  const ir = d.w / d.h, r = W / H;
  let dw, dh;
  if (ir > r) { dw = W * zoom; dh = dw / ir; } else { dh = H * zoom; dw = dh * ir; }
  ctx.drawImage(el, (W - dw) / 2 + panX, (H - dh) / 2 + panY, dw, dh);
}
function drawGradient(ctx, W, H, i) {
  const hues = [[0x6D,0x5B,0xAE],[0x4E,0x3F,0x86],[0x8A,0x72,0xC8]];
  const c = hues[i % hues.length];
  const g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, `rgb(${c[0]},${c[1]},${c[2]})`);
  g.addColorStop(1, '#1C1830');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}
function wrapText(ctx, text, maxW) {
  text = (text || '').trim();
  const lines = []; let line = '';
  for (let w of text.split(' ')) {
    while (ctx.measureText(w).width > maxW && w.length > 1) {
      let cut = w;
      while (ctx.measureText(cut).width > maxW && cut.length > 1) cut = cut.slice(0, -1);
      if (line) { lines.push(line); line = ''; }
      lines.push(cut); w = w.slice(cut.length);
    }
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, h / 2, w / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawScrim(ctx, W, H) {
  const g = ctx.createLinearGradient(0, H * 0.5, 0, H);
  g.addColorStop(0, 'rgba(10,7,20,0)');
  g.addColorStop(1, 'rgba(10,7,20,0.72)');
  ctx.fillStyle = g; ctx.fillRect(0, H * 0.5, W, H * 0.5);
}
function drawCaption(ctx, text, W, H, anim) {
  if (!text) return;
  text = text.trim();
  const maxW = W * 0.86;
  let fs = Math.round(W * 0.079);
  ctx.font = `800 ${fs}px Pretendard, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // 한 줄에 들어오도록 폰트 자동 축소
  let tw = ctx.measureText(text).width;
  const minFs = Math.round(W * 0.046);
  if (tw > maxW) {
    fs = Math.max(Math.floor(fs * (maxW / tw)), minFs);
    ctx.font = `800 ${fs}px Pretendard, sans-serif`;
    tw = ctx.measureText(text).width;
  }
  // 그래도 안 들어가는 아주 긴 문장만 줄바꿈
  const lines = tw > maxW ? wrapText(ctx, text, maxW) : [text];
  const lh = fs * 1.46;
  const blockH = lines.length * lh;
  const centerY = H * 0.70;

  const p = Math.min(Math.max(anim, 0), 1);
  const ease = 1 - Math.pow(1 - p, 3);
  const scale = 0.84 + 0.16 * ease;

  ctx.save();
  ctx.globalAlpha = ease;
  ctx.translate(W / 2, centerY); ctx.scale(scale, scale); ctx.translate(-W / 2, -centerY);

  let cy = centerY - blockH / 2 + lh / 2;
  for (const l of lines) {
    const tw = ctx.measureText(l).width;
    const padX = fs * 0.44, padY = fs * 0.30;
    const pillW = tw + padX * 2, pillH = fs + padY * 2;
    const bx = W / 2 - pillW / 2, by = cy - pillH / 2;
    ctx.fillStyle = 'rgba(20,16,38,0.88)';
    roundRect(ctx, bx, by, pillW, pillH, pillH / 2); ctx.fill();
    ctx.lineJoin = 'round'; ctx.lineWidth = fs * 0.13; ctx.strokeStyle = 'rgba(8,5,16,0.85)';
    ctx.strokeText(l, W / 2, cy);
    ctx.fillStyle = '#fff'; ctx.fillText(l, W / 2, cy);
    cy += lh;
  }
  ctx.restore();
}

// ── 저작권 없는 배경음 생성 (Web Audio 신디사이즈) ──────────────
function startGeneratedBGM(ac, dest, style, total) {
  const master = ac.createGain();
  master.gain.value = style === 'bright' ? 0.085 : 0.07;
  const lp = ac.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = style === 'bright' ? 2800 : 1500;
  lp.connect(master); master.connect(dest); master.connect(ac.destination);

  const calm = [
    [146.83, 220.00, 293.66], [196.00, 246.94, 392.00],
    [174.61, 220.00, 349.23], [130.81, 196.00, 261.63],
  ];
  const bright = [
    [261.63, 329.63, 392.00], [293.66, 369.99, 440.00],
    [329.63, 392.00, 493.88], [349.23, 440.00, 523.25],
  ];
  const prog = style === 'bright' ? bright : calm;
  const chordDur = style === 'bright' ? 2.4 : 3.4;
  const t0 = ac.currentTime + 0.05;
  const oscs = [];
  let idx = 0;
  for (let time = 0; time < total + chordDur; time += chordDur) {
    const chord = prog[idx % prog.length]; idx++;
    const startAt = t0 + time, endAt = startAt + chordDur;
    chord.forEach((f) => {
      const o = ac.createOscillator();
      o.type = style === 'bright' ? 'triangle' : 'sine';
      o.frequency.value = f;
      const g = ac.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(lp);
      g.gain.setValueAtTime(0, startAt);
      g.gain.linearRampToValueAtTime(0.5, startAt + 0.7);
      g.gain.setValueAtTime(0.5, endAt - 0.7);
      g.gain.linearRampToValueAtTime(0, endAt);
      o.start(startAt); o.stop(endAt + 0.1);
      oscs.push(o);
    });
  }
  return () => { oscs.forEach((o) => { try { o.stop(); } catch (_) {} }); try { master.disconnect(); } catch (_) {} };
}

// ── 메인 렌더 ──────────────
let rendering = false;
async function render() {
  if (rendering) return;
  reflectScript();
  if (!SCRIPT || !(SCRIPT.scenes || []).length) { showErr('대본이 비어 있습니다. 생성기에서 넘어오거나 JSON을 붙여넣어 주세요.'); return; }
  if (!window.MediaRecorder) { showErr('이 브라우저는 녹화를 지원하지 않습니다. Chrome을 사용해 주세요.'); return; }

  clearErr(); rendering = true; $('goBtn').disabled = true;
  $('ph').style.display = 'none'; $('video').style.display = 'none'; $('dlBtn').style.display = 'none';

  const scenes = SCRIPT.scenes;
  const W = +$('res').value, H = Math.round(W * 16 / 9);
  const canvas = $('canvas'); canvas.width = W; canvas.height = H;
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');

  try {
    // 폰트 로드 보장
    if (document.fonts && document.fonts.load) { try { await document.fonts.load(`800 64px Pretendard`); await document.fonts.ready; } catch (_) {} }

    // 1) 컷별 음성 생성
    const audios = [];
    for (let i = 0; i < scenes.length; i++) {
      setStatus(Math.round((i / scenes.length) * 40), `음성 생성 중… (${i + 1}/${scenes.length})`);
      const blob = await ttsBlob(scenes[i].narration || scenes[i].caption || ' ');
      audios.push(await audioFromBlob(blob));
    }

    // 2) 오디오 그래프 + 녹화 스트림 준비
    setStatus(42, '녹화 준비 중…');
    const AC = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AC();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const dest = audioCtx.createMediaStreamDestination();

    // BGM 준비 (업로드 or 자동 생성)
    let bgmStarter = null, stopBgm = null;
    const bgmMode = $('bgmMode').value;
    const totalDur = audios.reduce((s, a) => s + Math.max(a.duration || 2, 1.2), 0) + 1;
    if (bgmMode === 'upload' && $('bgmInput').files[0]) {
      try {
        const buf = await $('bgmInput').files[0].arrayBuffer();
        const audioBuf = await audioCtx.decodeAudioData(buf);
        const bs = audioCtx.createBufferSource(); bs.buffer = audioBuf; bs.loop = true;
        const g = audioCtx.createGain(); g.gain.value = 0.12;
        bs.connect(g); g.connect(dest); g.connect(audioCtx.destination);
        bgmStarter = () => bs.start();
        stopBgm = () => { try { bs.stop(); } catch (_) {} };
      } catch (_) {}
    } else if (bgmMode === 'calm' || bgmMode === 'bright') {
      bgmStarter = () => { stopBgm = startGeneratedBGM(audioCtx, dest, bgmMode, totalDur); };
    }

    const fps = 30;
    const vStream = canvas.captureStream(fps);
    const mixed = new MediaStream([...vStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);

    let mime = 'video/webm';
    if (MediaRecorder.isTypeSupported('video/mp4')) mime = 'video/mp4';
    else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')) mime = 'video/webm;codecs=vp9,opus';
    const rec = new MediaRecorder(mixed, { mimeType: mime, videoBitsPerSecond: 6_000_000 });
    const chunks = [];
    rec.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
    const done = new Promise((res) => { rec.onstop = res; });

    rec.start();
    if (bgmStarter) bgmStarter();

    // 3) 컷 순차 재생 + 캔버스 애니메이션
    for (let i = 0; i < scenes.length; i++) {
      setStatus(45 + Math.round((i / scenes.length) * 50), `녹화 중… (${i + 1}/${scenes.length})`);
      const a = audios[i];
      const dur = Math.max(a.duration || 2, 1.2);
      const m = MEDIA.length ? MEDIA[i % MEDIA.length] : null;

      const src = audioCtx.createMediaElementSource(a);
      src.connect(dest); src.connect(audioCtx.destination);

      // 영상 클립이면 재생 시작 (음소거 — 내레이션은 TTS)
      if (m && m.type === 'video') {
        try { m.el.currentTime = 0; m.el.muted = true; await m.el.play(); } catch (_) {}
      }

      let ended = false;
      a.onended = () => { ended = true; };
      a.currentTime = 0; await a.play();

      const start = performance.now();
      const PAN = [[1, 0.4], [-1, -0.4], [0.5, 1], [-0.6, -0.8]][i % 4];
      await new Promise((resolve) => {
        function frame() {
          const t = (performance.now() - start) / 1000;
          const fade = Math.min(t / 0.25, 1); // 컷 페이드인
          ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
          ctx.save();
          ctx.globalAlpha = fade;
          if (m && m.type === 'video') {
            drawCover(ctx, m.el, W, H, 1.04);
          } else if (m && m.type === 'image') {
            const p = Math.min(t / dur, 1);
            const zoom = 1.03 + 0.1 * p; // 켄번스
            const panX = PAN[0] * W * 0.03 * p;
            const panY = PAN[1] * H * 0.03 * p;
            drawBlurBg(ctx, m.el, W, H);
            drawContain(ctx, m.el, W, H, zoom, panX, panY);
          } else {
            drawGradient(ctx, W, H, i);
          }
          ctx.restore();
          drawScrim(ctx, W, H);
          drawCaption(ctx, scenes[i].caption || '', W, H, t / 0.28);
          if (ended || t > dur + 0.5) resolve(); else requestAnimationFrame(frame);
        }
        frame();
      });

      if (m && m.type === 'video') { try { m.el.pause(); } catch (_) {} }
    }

    setStatus(97, '영상 마무리 중…');
    if (stopBgm) stopBgm();
    rec.stop();
    await done;

    const blob = new Blob(chunks, { type: mime });
    const url = URL.createObjectURL(blob);
    const ext = mime.startsWith('video/mp4') ? 'mp4' : 'webm';
    canvas.style.display = 'none';
    const v = $('video'); v.src = url; v.style.display = 'block';
    const dl = $('dlBtn'); dl.href = url; dl.download = `shortform_${Date.now()}.${ext}`; dl.style.display = 'inline-flex';
    setStatus(100, `완성! (${ext.toUpperCase()})`);
  } catch (e) {
    showErr('렌더 실패: ' + (e.message || e));
    $('status').style.display = 'none';
    $('canvas').style.display = 'none';
    $('ph').style.display = 'block';
  } finally {
    rendering = false; $('goBtn').disabled = false;
  }
}

$('goBtn').addEventListener('click', render);
loadHandoff();
</script>
</body>
</html>
